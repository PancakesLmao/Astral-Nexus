name: astral-nexus-dev

services:
  astralnexus_ui:
    build:
      context: ./astralnexus_ui
      dockerfile: Dockerfile
      target: build  # Use build stage for development
    ports:
      - "3000:3000"
      - "24678:24678"  # Vite HMR port
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3001}
      - FRONTEND_SUCCESS_REDIRECT=${FRONTEND_SUCCESS_REDIRECT}
      - FRONTEND_ERROR_REDIRECT=${FRONTEND_ERROR_REDIRECT}
    volumes:
      - ./astralnexus_ui:/usr/src/app
      - /usr/src/app/node_modules
    command: pnpm run dev
    networks:
      - astral_network
    depends_on:
      - astralnexus_be
    restart: unless-stopped
    env_file:
      - .env

  astralnexus_be:
    build:
      context: ./astralnexus_be
      dockerfile: Dockerfile
      target: base  # Use base stage for development
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3001}
      - HOST=${HOST:-api.localtest.me}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@astralnexus_db:5432/${POSTGRES_DB}
      - DB_HOST=astralnexus_db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}
      - FRONTEND_SUCCESS_REDIRECT=${FRONTEND_SUCCESS_REDIRECT}
      - FRONTEND_ERROR_REDIRECT=${FRONTEND_ERROR_REDIRECT}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_DOMAIN=${SESSION_DOMAIN:-localhost}
      - SESSION_SECURE=${SESSION_SECURE:-false}
      - SESSION_SAME_SITE=${SESSION_SAME_SITE:-lax}
      - SESSION_HTTP_ONLY=${SESSION_HTTP_ONLY:-true}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - POSTGRES_LOG_STATEMENT=${POSTGRES_LOG_STATEMENT:-all}
      - POSTGRES_INITDB_ARGS=${POSTGRES_INITDB_ARGS}
    volumes:
      - ./astralnexus_be:/usr/src/app
      - /usr/src/app/node_modules
    command: bun run dev
    networks:
      - astral_network
    depends_on:
      astralnexus_db:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - .env

  astralnexus_db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_LOG_STATEMENT=${POSTGRES_LOG_STATEMENT:-all}
      - POSTGRES_INITDB_ARGS=${POSTGRES_INITDB_ARGS}
    volumes:
      - astralnexus_db_data:/var/lib/postgresql/data
      - ./astralnexus_be/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - astral_network
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pancakes} -d ${POSTGRES_DB:-astralnexus}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  astralnexus_db_data:
    driver: local

networks:
  astral_network:
    driver: bridge
