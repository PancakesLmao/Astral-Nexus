upstream backend {
    server astralnexus_be:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost *.localtest.me localtest.me;
    client_max_body_size 20M;
    
    # Serve static files
    root /usr/share/nginx/html;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_disable "msie6";
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Determine fallback page based on subdomain
    set $fallback_page "/root.html";
    if ($host ~* ^admin\.(.+)$) {
        set $fallback_page "/admin.html";
    }
    if ($host ~* ^blog\.(.+)$) {
        set $fallback_page "/blog.html";
    }
    
    # Static files - serve as-is
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }
    
    # HTML files - serve with short cache
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # SPA routing - for all other requests, try file, else serve fallback
    location / {
        if (!-f $request_filename) {
            rewrite ^.*$ $fallback_page break;
        }
    }
}