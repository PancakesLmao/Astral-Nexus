name: astral-nexus-prod

services:
  astralnexus_ui:
    build:
      context: ./astralnexus_ui
      dockerfile: Dockerfile
      target: production  # Use production nginx stage
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    networks:
      - astral_network
    depends_on:
      - astralnexus_be
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  astralnexus_be:
    build:
      context: ./astralnexus_be
      dockerfile: Dockerfile
      # Uses multi-stage build with compiled binary
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@astralnexus_db:5432/${POSTGRES_DB}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SESSION_DOMAIN=${SESSION_DOMAIN}
      - CORS_ORIGIN=${CORS_ORIGIN}
    networks:
      - astral_network
    depends_on:
      astralnexus_db:
        condition: service_healthy
    restart: always
    env_file:
      - .env

  astralnexus_db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=${POSTGRES_INITDB_ARGS:-}
      # Disable verbose logging in production
      - POSTGRES_LOG_STATEMENT=mod
      - POSTGRES_LOG_DURATION=on
    volumes:
      - astralnexus_db_data:/var/lib/postgresql/data
      - ./astralnexus_be/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - astral_network
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Add backup strategy
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: astral-nexus-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - astral_network
    depends_on:
      - astralnexus_ui
    restart: unless-stopped

volumes:
  astralnexus_db_data:
    driver: local

networks:
  astral_network:
    driver: bridge
